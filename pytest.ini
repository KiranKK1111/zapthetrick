[pytest]
# The "unclosed transport / I/O operation on closed pipe" noise is a benign
# Windows-only artifact of asyncio's ProactorEventLoop: when a subprocess/pipe
# transport is garbage-collected AFTER its event loop has closed, its __del__
# tries to touch the already-closed pipe and CPython emits a ResourceWarning,
# which pytest surfaces as PytestUnraisableExceptionWarning. It reflects nothing
# about the test's assertions (the test itself passes). We silence just that one
# category so real warnings still show.
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    # A SWIG-wrapped native dependency (praat-parselmouth, used by the prosody
    # analyzer) registers a `swigvarlink` type that lacks `__module__` on
    # Python 3.12, so CPython emits a DeprecationWarning at import/shutdown.
    # It reflects nothing about our code or the tests — silence just it.
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    # urllib3 politely notes PySocks isn't installed when its socks module is
    # imported by the embedder's HTTP chain. We don't use SOCKS proxies.
    ignore:SOCKS support in urllib3 requires the installation:Warning
