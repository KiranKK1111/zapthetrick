# Alembic config for ZapTheTrick AI.
#
# Per DataBaseArchitecture.md the migrations directory lives at
# `backend/storage/migrations/`. The connection string is built at
# runtime from `cfg.database.postgres.*` in `storage/migrations/env.py`,
# so the `sqlalchemy.url` value below is only used as a fallback when
# someone runs alembic without our config loader available.
#
# Usage from `backend/`:
#   alembic upgrade head
#   alembic revision --autogenerate -m "add X"
#   alembic downgrade -1

[alembic]
script_location = storage/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://postgres:local@localhost:5432/interviewcopilot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
