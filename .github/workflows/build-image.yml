name: Build & push RunPod image

# Builds the self-contained ZapTheTrick pod image in GitHub's datacenter and
# pushes it to Docker Hub — so the big (~3.5 GB torch) layer never crosses your
# home uplink. Runs on every push to main, or on demand.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "requirements.txt"
      - "config.example.yaml"
      - "deploy/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

concurrency:
  group: build-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/runpod.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zapthetrick-runpod:latest
          # Layer cache in the registry → later builds only re-push what changed.
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zapthetrick-runpod:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/zapthetrick-runpod:buildcache,mode=max
